stages:
  - test
  - report

variables:
  VLAM_AI_MODEL: "llama3.2"
  VLAM_AI_API_KEY: "${VLAM_AI_API_KEY}"
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

cache:
  paths:
    - .cache/pip
    - .venv/

.python-setup:
  image: python:3.12-slim
  before_script:
    - pip install uv
    - uv sync --frozen --dev
    - apt-get update -qq && apt-get install -y -qq git > /dev/null

test:
  extends: .python-setup
  stage: test
  script:
    - uv run pytest --cov=src/vlamguard --cov-fail-under=95 -q
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

.vlamguard-report:
  extends: .python-setup
  stage: report
  before_script:
    - pip install uv
    - uv sync --frozen --dev
    - apt-get update -qq && apt-get install -y -qq git curl > /dev/null
    # Install glab CLI
    - curl -sL "https://gitlab.com/gitlab-org/cli/-/releases/v1.46.1/downloads/glab_1.46.1_linux_amd64.deb" -o /tmp/glab.deb
    - dpkg -i /tmp/glab.deb
    # Configure git identity
    - git config --global user.name "gitlab-ci[bot]"
    - git config --global user.email "gitlab-ci[bot]@noreply.gitlab.com"
    # Start Vlam AI proxy
    - pip install -r vlam-proxy/requirements.txt
    - nohup python vlam-proxy/proxy.py --port "${PROXY_PORT:-8080}" &
    - |
      for i in $(seq 1 30); do
        if curl -sf "http://localhost:${PROXY_PORT:-8080}/health" > /dev/null 2>&1; then
          echo "Vlam AI proxy is ready"
          break
        fi
        sleep 1
      done
    - export VLAM_AI_BASE_URL="http://localhost:${PROXY_PORT:-8080}"
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_BRANCH =~ /^feat\//
  artifacts:
    paths:
      - demo/reports/
    when: always
    expire_in: 30 days

vlamguard-report-best-practices-fail:
  extends: .vlamguard-report
  script:
    - >
      uv run vlamguard check
      --chart demo/charts/best-practices-fail
      --env production
      --skip-external
      --create-issues
      --create-pr
      --platform gitlab
      --output json
      --output-file demo/reports/best-practices-fail-report.json
  allow_failure: true

