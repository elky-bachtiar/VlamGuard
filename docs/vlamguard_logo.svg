<?xml version="1.0" encoding="UTF-8"?>
<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="ringGrad" x1="200" y1="824" x2="824" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ff7a00"/>
      <stop offset="0.5" stop-color="#ffb000"/>
      <stop offset="1" stop-color="#cfd3d8"/>
    </linearGradient>

    <radialGradient id="bgRad" cx="50%" cy="40%" r="70%">
      <stop offset="0" stop-color="#141414" stop-opacity="1"/>
      <stop offset="1" stop-color="#000000" stop-opacity="1"/>
    </radialGradient>

    <linearGradient id="flameOuter" x1="420" y1="840" x2="604" y2="240" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#b00020"/>
      <stop offset="0.35" stop-color="#ff3b00"/>
      <stop offset="0.75" stop-color="#ff9a00"/>
      <stop offset="1" stop-color="#ffe26a"/>
    </linearGradient>

    <linearGradient id="flameInner" x1="460" y1="820" x2="560" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ff2a00"/>
      <stop offset="0.65" stop-color="#ffb000"/>
      <stop offset="1" stop-color="#fff0a5"/>
    </linearGradient>

    <pattern id="honey" width="60" height="52" patternUnits="userSpaceOnUse">
      <!-- hex outline -->
      <path d="M15 1 L45 1 L59 26 L45 51 L15 51 L1 26 Z" fill="none" stroke="#ff7a00" stroke-opacity="0.35" stroke-width="2"/>
    </pattern>

    <clipPath id="badgeClip">
      <circle cx="512" cy="420" r="220"/>
    </clipPath>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <!-- Background (can be removed for transparent exports) -->
  

  <!-- Badge -->
  <g filter="url(#shadow)">
    <circle cx="512" cy="420" r="240" fill="none" stroke="url(#ringGrad)" stroke-width="22"/>
    <circle cx="512" cy="420" r="220" fill="#0b0b0b"/>
  </g>

  <!-- Honeycomb (subtle) clipped inside badge -->
  <g clip-path="url(#badgeClip)" opacity="0.9">
    <rect x="292" y="200" width="440" height="440" fill="url(#honey)"/>
  </g>

  <!-- Flame (original vector shape) -->
  <g>
    <!-- Outer flame -->
    <path d="M540 215
             C575 295 650 320 650 410
             C650 520 565 610 512 640
             C455 672 390 665 345 605
             C300 545 312 465 362 410
             C404 363 424 332 420 290
             C452 320 472 350 486 388
             C498 345 520 300 540 215 Z"
          fill="url(#flameOuter)"/>
    <!-- Inner flame -->
    <path d="M520 340
             C552 382 585 398 585 445
             C585 505 540 555 512 575
             C480 597 445 585 425 550
             C405 515 418 470 445 445
             C468 423 480 410 478 387
             C494 400 506 418 512 438
             C518 408 522 380 520 340 Z"
          fill="url(#flameInner)" opacity="0.95"/>
  </g>

  <!-- Wordmark -->
  <g font-family="Inter, Segoe UI, Arial, sans-serif" font-weight="800" font-size="118" text-anchor="middle">
    <text x="512" y="840" letter-spacing="2">
      <tspan fill="#ff7a00">VLAM</tspan><tspan fill="#e9edf2">GUARD</tspan>
    </text>
  </g>
</svg>
