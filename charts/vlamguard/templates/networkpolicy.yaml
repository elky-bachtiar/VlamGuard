{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "vlamguard.fullname" . }}
  labels:
    {{- include "vlamguard.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "vlamguard.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - ports:
        - port: 8000
          protocol: TCP
  egress:
    # Allow DNS resolution
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # Allow traffic to AI backend
    - ports:
        - port: {{ .Values.networkPolicy.aiBackendPort }}
          protocol: TCP
{{- end }}
