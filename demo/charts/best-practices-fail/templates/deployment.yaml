apiVersion: extensions/v1beta1
kind: Deployment
metadata:
  name: legacy-app
  namespace: production
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: legacy-app
  template:
    metadata:
      labels:
        app: legacy-app
    spec:
      containers:
        - name: app
          image: {{ .Values.image }}
          env:
            - name: APP_ENV
              value: production
            - name: APP_ENV
              value: staging
---
apiVersion: v1
kind: Service
metadata:
  name: legacy-svc
  namespace: production
spec:
  type: NodePort
  selector:
    app: legacy-app
  ports:
    - port: 80
      targetPort: 8080
      nodePort: 30080
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: cleanup
  namespace: production
spec:
  schedule: "0 2 * * *"
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: cleanup
              image: busybox:1.36
          restartPolicy: OnFailure
