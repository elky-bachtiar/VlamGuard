name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Helm 3
        uses: azure/setup-helm@v4
        with:
          version: "3.17.0"

      - name: Install dependencies
        run: uv sync --frozen --dev

      - name: Run tests with coverage
        run: uv run pytest --cov=src/vlamguard --cov-fail-under=95 -q

  docker:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract tag name
        id: tag
        run: |
          # Strip the leading "refs/tags/" prefix
          RAW_TAG="${GITHUB_REF#refs/tags/}"
          echo "name=${RAW_TAG}" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ steps.tag.outputs.name }}
            ghcr.io/${{ github.repository }}:latest

  helm:
    name: Package and Publish Helm Chart
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Helm 3
        uses: azure/setup-helm@v4
        with:
          version: "3.17.0"

      - name: Package Helm chart
        run: |
          mkdir -p /tmp/helm-release
          helm package charts/vlamguard/ --destination /tmp/helm-release/

      - name: Checkout gh-pages branch (or create it)
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages
        continue-on-error: true

      - name: Initialise gh-pages directory if branch is new
        run: |
          if [ ! -d gh-pages ]; then
            mkdir gh-pages
          fi

      - name: Copy packaged chart into gh-pages
        run: cp /tmp/helm-release/*.tgz gh-pages/

      - name: Regenerate Helm repo index
        run: |
          REPO_URL="https://${{ github.repository_owner }}.github.io/${GITHUB_REPOSITORY#*/}"
          helm repo index gh-pages/ --url "${REPO_URL}"

      - name: Publish to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: gh-pages
          publish_branch: gh-pages
          keep_files: true

  build-binaries:
    name: Build ${{ matrix.artifact_name }}
    runs-on: ${{ matrix.os }}
    needs: test
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: vlamguard-linux-amd64
          - os: macos-13
            artifact_name: vlamguard-darwin-amd64
          - os: macos-14
            artifact_name: vlamguard-darwin-arm64
          - os: windows-latest
            artifact_name: vlamguard-windows-amd64.exe
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install runtime dependencies
        run: uv sync --frozen --no-dev

      - name: Install PyInstaller
        run: uv pip install pyinstaller==6.11.1

      - name: Build binary
        run: uv run pyinstaller vlamguard.spec --distpath dist/

      - name: Rename binary (Unix)
        if: runner.os != 'Windows'
        run: mv dist/vlamguard "dist/${{ matrix.artifact_name }}"

      - name: Rename binary (Windows)
        if: runner.os == 'Windows'
        run: move dist\vlamguard.exe "dist\${{ matrix.artifact_name }}"

      - name: Smoke test (Unix)
        if: runner.os != 'Windows'
        run: |
          chmod +x "dist/${{ matrix.artifact_name }}"
          "dist/${{ matrix.artifact_name }}" --help
          "dist/${{ matrix.artifact_name }}" check --help
          "dist/${{ matrix.artifact_name }}" security-scan --help

      - name: Smoke test (Windows)
        if: runner.os == 'Windows'
        run: |
          dist\${{ matrix.artifact_name }} --help
          dist\${{ matrix.artifact_name }} check --help
          dist\${{ matrix.artifact_name }} security-scan --help

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.artifact_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
