name: Bug Report
description: Report a bug in VlamGuard
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the sections below.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Run `vlamguard check --chart ./my-chart`
        2. See error...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: VlamGuard Version
      placeholder: "1.0.0-alpha.2"
    validations:
      required: true

  - type: dropdown
    id: command
    attributes:
      label: Command Used
      options:
        - vlamguard check
        - vlamguard security-scan
        - vlamguard compliance
        - vlamguard discover
        - API endpoint
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Python version, etc.
      placeholder: |
        - OS: macOS 15.3
        - Python: 3.12.5
        - Helm: 3.16.0

  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs
      description: Paste any relevant output (use --debug flag).
      render: shell
